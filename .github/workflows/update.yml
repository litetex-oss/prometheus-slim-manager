name: Update repo

on:
  workflow_dispatch:
    inputs:
      tag:
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ -z "${{ inputs.tag }}" ]]; then
            tag=$(curl -s -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/repos/prometheus/prometheus/releases/latest \
              | jq -r '.tag_name')
          else
            tag="${{ inputs.tag }}"
          fi

          if curl --fail -s -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/repos/litetex-oss/prometheus-slim/branches/release-$tag; then
            echo "Branch already exists; Aborting"
            exit 0
          fi

          git clone https://github.com/prometheus/prometheus.git --branch "$tag"
